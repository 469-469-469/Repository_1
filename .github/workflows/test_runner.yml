name: Run Tests and Generate Report

on:
  push: {}
  pull_request:
    branches: [ main ]

env:
  HOST: localhost
  DB_MOVIES_HOST: localhost
  DB_MOVIES_PORT: 5432
  DB_MOVIES_NAME: db_movies
  DB_MOVIES_USERNAME: postgres
  DB_MOVIES_PASSWORD: postgres
  SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
  SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_movies
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:

    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-check allure-pytest flake8 psycopg2-binary

    # 4. Wait for DB
    - name: Wait for PostgreSQL
      run: |
        for i in {1..20}; do
          pg_isready -h localhost -p 5432 && break
          sleep 2
        done

    # 5. Init DB (ВАЖНО: путь фиксированный)
    - name: Init DB
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d db_movies -f ./init.sql

    # 6. Install Allure CLI (FIXED)
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jre wget unzip

        wget https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
        tar -xzf allure-2.24.1.tgz
        sudo mv allure-2.24.1 /opt/allure

        echo "/opt/allure/bin" >> $GITHUB_PATH
        export PATH=$PATH:/opt/allure/bin

        allure --version

    # 7. Run tests (ALLURE RESULTS)
    - name: Run tests
      run: |
        pytest tests -v --alluredir=allure-results

    # 8. Generate report
    - name: Generate Allure report
      if: always()
      run: |
        allure generate allure-results -o allure-report --clean

    # 9. Upload results
    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results

    # 10. Upload report
    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
