name: Run Tests and Generate Report

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_movies
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h localhost -U postgres -d db_movies"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      API_SUPERADMIN_EMAIL: ${{ secrets.API_SUPERADMIN_EMAIL }}
      API_SUPERADMIN_PASSWORD: ${{ secrets.API_SUPERADMIN_PASSWORD }}

      DB_MOVIES_HOST: 127.0.0.1
      DB_MOVIES_PORT: 5432
      DB_MOVIES_NAME: db_movies
      DB_MOVIES_USERNAME: postgres
      DB_MOVIES_PASSWORD: postgres

      PGPASSWORD: postgres
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install allure-pytest pytest-playwright
          playwright install --with-deps

      - name: Wait for Postgres
        run: |
          for i in {1..40}; do
            pg_isready -h 127.0.0.1 -U postgres -d db_movies && break
            sleep 2
          done

      - name: Run DB init
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d db_movies -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d db_movies -f init.sql

      - name: Wait DB sync
        run: sleep 3

      - name: Run tests
        run: pytest -m "not db_check"--alluredir=allure-results

      - name: Generate report
        run: allure generate allure-results -o allure-report --clean

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
