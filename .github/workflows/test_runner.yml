name: Run Tests and Generate Report

on:
  push: {}
  pull_request:
    branches: [ main ]

env:
  DB_MOVIES_HOST: localhost
  DB_MOVIES_PORT: 5432
  DB_MOVIES_NAME: db_movies
  DB_MOVIES_USERNAME: postgres
  DB_MOVIES_PASSWORD: postgres
  SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
  SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_movies
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. Код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-check allure-pytest flake8 psycopg2-binary

      # 4. Wait DB
      - name: Wait for PostgreSQL
        run: sleep 5

      # 5. Init DB schema
      - name: Init database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d db_movies -f init.sql

      # 6. Lint
      - name: Run linter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 7. Tests with Allure results
      - name: Run tests
        run: |
          pytest tests -v --alluredir=allure-results

      # 8. Generate Allure report (always)
      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-report
          allure generate allure-results -o allure-report --clean

      # 9. Upload Allure results
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      # 10. Upload Allure report
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
