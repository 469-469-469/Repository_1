name: Run Tests and Generate Report

on:
  push: {}
  pull_request:
    branches: [ main ]

env:
  HOST: localhost
  DB_MOVIES_HOST: localhost
  DB_MOVIES_PORT: 5432
  DB_MOVIES_NAME: db_movies
  DB_MOVIES_USERNAME: postgres
  DB_MOVIES_PASSWORD: postgres
  SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
  SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_movies
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest allure-pytest psycopg2-binary

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U postgres && break
          sleep 2
        done

    - name: Init DB
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d db_movies -f init.sql

    - name: Run tests
      run: |
        pytest tests -v --alluredir=allure-results

    - name: Install Allure CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre wget

        wget https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
        tar -zxvf allure-2.24.1.tgz
        sudo mv allure-2.24.1 /opt/allure
        echo "/opt/allure/bin" >> $GITHUB_PATH

    - name: Generate Allure Report
      if: always()
      run: |
        mkdir -p allure-report
        allure generate allure-results -o allure-report --clean

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
